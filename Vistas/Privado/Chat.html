<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – AM DEV Solutions</title>
  <link rel="stylesheet" href="../../Estilos/base.css" />
  <link rel="stylesheet" href="../../Estilos/chat.css" />
</head>
<body>

  <div class="app">

    <aside class="sidebar">

      <div class="logo">
        <img src="../../Recursos/logo.png" alt="AM DEV Solutions">
      </div>

      <div class="sidebar-usuario" id="sidebarUsuario">
        <span class="usuario-avatar">👤</span>
        <span class="usuario-nombre" id="usuarioNombre">Usuario</span>
      </div>

      <div class="historial-titulo">Conversaciones</div>
      <ul class="historial-lista" id="historialLista"></ul>

    </aside>

    <main class="main">

      <header class="header">
        <button class="btn-icon">⚙️</button>
        <button class="btn-nuevo-chat" id="btnNuevoChat">Nuevo chat</button>
        <button class="btn-logout" id="btnLogout">Cerrar sesión</button>
      </header>

      <div class="chat-area" id="chatArea">
        <div class="bienvenida" id="bienvenida">
          <img src="../../Recursos/logo.png" alt="AM DEV Solutions" class="logo-centro" />
        </div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="inputMensaje"
          placeholder="Pregunta a la IA"
          autocomplete="off"
        />
        <button id="btnEnviar">➤</button>
      </div>

    </main>

  </div>

  <script src="../../Scripts/Servicios/api.js"></script>
  <script src="../../Scripts/Servicios/autenticacion.js"></script>
  <script src="../../Scripts/Servicios/chat.js"></script>
  <script src="../../Scripts/Servicios/historial.js"></script>
  <script src="../../Scripts/Vistas/chat.js"></script>

</body>
</html>
